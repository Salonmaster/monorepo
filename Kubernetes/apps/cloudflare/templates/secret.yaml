apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel
spec:
  refreshInterval: 0h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-credentials
    creationPolicy: Owner
  data:
    - secretKey: credentials.json
      remoteRef:
        key: system/cloudflare/tunnel-credentials
        property: credentials.json
    - secretKey: cert.pem
      remoteRef:
        key: system/cloudflare/tunnel-credentials
        property: cert.pem
