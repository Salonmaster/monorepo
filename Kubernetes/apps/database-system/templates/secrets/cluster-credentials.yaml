apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-credentials
spec:
  refreshInterval: 0h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cluster-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: system/database-system/cluster-credentials
        property: password
    - secretKey: repmgr-password
      remoteRef:
        key: system/database-system/cluster-credentials
        property: repmgr-password
