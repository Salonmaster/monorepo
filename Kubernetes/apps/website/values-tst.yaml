# Default values for salonmaster-website.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


image:
  repository: ghcr.io/salonmaster/salonmaster-worker
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "main"
imagePullSecrets: [{name: registrypullsecret}]
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext:
  capabilities:
    add:
      - CAP_NET_BIND_SERVICE
  readOnlyRootFilesystem: false
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 250m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
redis:
  architecture: standalone
  tls:
    enabled: true
    authClients: false
    autoGenerated: true
  networkPolicy:
    enabled: false
    allowExternal: false
keycloak:
  tls:
    enabled: true
    autoGenerated: true
postgresql:
  auth:
    database: website
    username: website
    password: website
fluent-bit:
  config:
    service: |
      [SERVICE]
          Flush        1
          Daemon       Off
          LogLevel     info
          Config_Watch On
          HTTP_Server  On
          HTTP_Listen  0.0.0.0
          HTTP_Port    2020
          parsers_file parsers.conf
    inputs: |
      [INPUT]
          Name    syslog
          Parser  syslog-rfc3164
          Listen  0.0.0.0
          Port    5140
          Mode    udp
    filters: |
      [FILTER]
          Name   parser
          Match  syslog.*
          Key_Name message
          Parser nginx
    outputs: |
      [OUTPUT]
          Name stdout
          Match *
  service:
    extraPorts:
      - name: syslog
        port: 5140
        protocol: UDP
        targetPort: 5140
website_image:
  tag: tst-6dd8e114bfaa
worker_image:
  tag: tst-6dd8e114bfaa
