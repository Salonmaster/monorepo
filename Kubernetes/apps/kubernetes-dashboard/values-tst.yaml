oauth2-proxy:
  config:
    existingSecret: oauth2-proxy-secret
  extraEnv:
    - name: OAUTH2_PROXY_PROVIDER
      value: keycloak-oidc
    - name: OAUTH2_PROXY_OIDC_ISSUER_URL
      value: https://auth.tst.salonmaster.dev/realms/master
    - name: OAUTH2_PROXY_CODE_CHALLENGE_METHOD
      value: S256
    - name: OAUTH2_PROXY_REDIRECT_URI
      value: https://dashboard.tst.salonmaster.dev/oauth2/callback
    - name: OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL
      value: "true"
    - name: OAUTH2_PROXY_SSL_UPSTREAM_INSECURE_SKIP_VERIFY
      value: "true"
    - name: OAUTH2_PROXY_UPSTREAMS
      value: "https://{{.Release.Name}}-kong-proxy"
    - name: OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER
      value: "true"
    - name: OAUTH2_PROXY_SKIP_PROVIDER_BUTTON
      value: "true"
    - name: OAUTH2_PROXY_SKIP_AUTH_STRIP_HEADERS
      value: "true"
