apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-database-credentials
spec:
  refreshInterval: 0h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-database-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: system/database-system/keycloak-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: system/database-system/keycloak-credentials
        property: password
