apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-credentials
spec:
  refreshInterval: 0h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-credentials
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: system/keycloak/argocd
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: system/keycloak/argocd
        property: client-secret

