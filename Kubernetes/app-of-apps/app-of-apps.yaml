apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    repoURL: git@github.com:Salonmaster/Kubernetes.git
    targetRevision: tst
    path: app-of-apps
    helm:
      valueFiles:
        - values-tst.yaml
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true