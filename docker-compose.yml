services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salonmaster
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salonmaster}
      POSTGRES_DB: salonmaster
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salonmaster"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./Backend/config.dev.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  website:
    build:
      context: ./Website
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./Website/.env.dev:/www/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  pgdata:
