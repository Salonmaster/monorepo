error_log syslog:server=${DEPLOYMENT_NAME}-fluent-bit:5140 debug;

worker_processes                1;

pid                             /tmp/nginx.pid;

events {
    worker_connections          1024;
}

http {
    include                     /etc/nginx/mime.types;
    default_type                application/octet-stream;
    sendfile                    on;
    keepalive_timeout           3000;

    access_log syslog:server=${DEPLOYMENT_NAME}-fluent-bit:5140,facility=local7,tag=nginx,severity=debug combined;
    client_body_temp_path /tmp/nginx 1 2;
    proxy_temp_path /tmp/nginx 1 2;
    fastcgi_temp_path /tmp/nginx 1 2;
    uwsgi_temp_path /tmp/nginx 1 2;
    scgi_temp_path /tmp/nginx 1 2;
    set_real_ip_from  10.0.0.1/8;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;


    server {
        listen 8080;
        listen [::]:8080;
        server_name salonmaster.nl;
        root /www/public;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        index index.php;

        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            try_files $uri =404;
            include /etc/nginx/fastcgi_params;
            fastcgi_pass    127.0.0.1:9000;
            fastcgi_index   index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
